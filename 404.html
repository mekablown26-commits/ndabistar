<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Ndabistar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #08080a;
      --gold:  #C8A96E;
      --gold2: #E8C98A;
      --dim:   #111115;
      --muted: #5a5a66;
      --white: #F8F8F5;
      --red:   #E8412A;
      --cyan:  #2AE8D4;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      cursor: none;
    }

    /* ── CANVAS BG ── */
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── CUSTOM CURSOR ── */
    #pencil {
      position: fixed; z-index: 9999;
      pointer-events: none;
      transform: translate(-4px, -28px);
      transition: none;
      font-size: 28px;
      filter: drop-shadow(0 0 6px rgba(200,169,110,.6));
    }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative; z-index: 2;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      user-select: none;
    }

    /* ── GLITCH 404 ── */
    .big-404 {
      font-family: 'Bebas Neue';
      font-size: clamp(10rem, 28vw, 22rem);
      line-height: .85;
      letter-spacing: .05em;
      color: var(--gold);
      position: relative;
      cursor: pointer;
      transition: transform .1s;
    }
    .big-404::before {
      content: '404';
      position: absolute; top: 0; left: 0;
      color: var(--red);
      animation: g1 3s infinite steps(1);
      clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%);
    }
    .big-404::after {
      content: '404';
      position: absolute; top: 0; left: 0;
      color: var(--cyan);
      animation: g2 3s infinite steps(1) .12s;
      clip-path: polygon(0 60%, 100% 60%, 100% 78%, 0 78%);
    }
    @keyframes g1 {
      0%,85%,100% { transform:none; opacity:0; }
      86% { transform:translateX(-6px); opacity:.8; }
      88% { transform:translateX(5px);  opacity:.5; }
      90% { transform:none; opacity:0; }
    }
    @keyframes g2 {
      0%,85%,100% { transform:none; opacity:0; }
      87% { transform:translateX(7px);  opacity:.7; }
      89% { transform:translateX(-4px); opacity:.4; }
      91% { transform:none; opacity:0; }
    }
    .big-404:hover { transform: scale(1.04); color: var(--gold2); }
    .big-404:active { transform: scale(.96); }

    /* ── SUB TEXT ── */
    .lost-text {
      font-size: clamp(.65rem,1.5vw,.85rem);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: .5rem;
    }

    /* ── DRAW PROMPT ── */
    .draw-prompt {
      font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(200,169,110,.5);
      margin-top: 1.5rem;
      display: flex; align-items: center; gap: .8rem;
    }
    .draw-prompt::before,
    .draw-prompt::after {
      content: ''; display: block;
      width: 20px; height: 1px; background: rgba(200,169,110,.3);
    }

    /* ── DRAW CANVAS ── */
    #draw-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1; cursor: none;
    }

    /* ── CONTROLS ── */
    .controls {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 1rem;
      z-index: 10; flex-wrap: wrap; justify-content: center;
    }

    /* color swatches */
    .swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: none;
      border: 2px solid transparent;
      transition: transform .2s, border-color .2s;
    }
    .swatch:hover { transform: scale(1.3); }
    .swatch.active { border-color: var(--white); transform: scale(1.2); }

    .ctrl-btn {
      font-family: 'Space Mono';
      font-size: .52rem; letter-spacing: .18em; text-transform: uppercase;
      padding: .5rem 1rem;
      border: 1px solid rgba(200,169,110,.3);
      background: none; color: var(--muted);
      cursor: none; transition: all .25s;
    }
    .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* size indicator */
    .size-wrap {
      display: flex; align-items: center; gap: .5rem;
    }
    .size-dot {
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      transition: width .2s, height .2s;
    }

    /* ── HOME BTN ── */
    .home-btn {
      position: fixed; top: 2rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono';
      font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      border-bottom: 1px solid rgba(200,169,110,.2);
      padding-bottom: .3rem;
      transition: color .3s, border-color .3s;
      z-index: 10; cursor: none;
    }
    .home-btn:hover { color: var(--gold); border-color: var(--gold); }

    /* ── EASTER EGG MESSAGE ── */
    #egg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      background: var(--dim);
      border: 1px solid var(--gold);
      padding: 2rem 3rem; text-align: center;
      z-index: 20; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    #egg.show { transform: translate(-50%,-50%) scale(1); pointer-events: all; }
    #egg h2 { font-family:'Bebas Neue'; font-size:2.5rem; color:var(--gold); margin-bottom:.5rem; }
    #egg p  { font-size:.65rem; color:var(--muted); letter-spacing:.12em; line-height:1.8; }
    #egg .close-egg {
      margin-top:1.2rem; font-size:.55rem; letter-spacing:.2em;
      text-transform:uppercase; color:var(--muted);
      background:none; border:1px solid rgba(200,169,110,.3);
      padding:.5rem 1.2rem; cursor:pointer; font-family:'Space Mono';
      transition:all .25s;
    }
    #egg .close-egg:hover { color:var(--gold); border-color:var(--gold); }

    /* brush size slider */
    input[type=range] {
      -webkit-appearance:none; appearance:none;
      width: 80px; height: 2px;
      background: rgba(200,169,110,.3);
      outline: none; cursor: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; appearance:none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--gold); cursor: none;
    }

    @media(max-width:600px) {
      body { cursor: auto; }
      #pencil { display: none; }
      #draw-canvas { cursor: crosshair; }
      .home-btn, .ctrl-btn, .swatch { cursor: pointer; }
    }
  </style>
</head>
<body>

  <!-- pencil cursor -->
  <div id="pencil">✏️</div>

  <!-- background stars canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- draw canvas (on top, captures mouse) -->
  <canvas id="draw-canvas"></canvas>

  <!-- main content -->
  <div class="content">
    <div class="big-404" id="num404">404</div>
    <p class="lost-text">You're lost. But hey — draw something.</p>
    <p class="draw-prompt">Draw anywhere on this page</p>
  </div>

  <!-- controls -->
  <div class="controls">
    <!-- color swatches -->
    <div class="swatch active" style="background:#C8A96E" data-color="#C8A96E" title="Gold"></div>
    <div class="swatch" style="background:#E8412A" data-color="#E8412A" title="Red"></div>
    <div class="swatch" style="background:#2AE8D4" data-color="#2AE8D4" title="Cyan"></div>
    <div class="swatch" style="background:#F8F8F5" data-color="#F8F8F5" title="White"></div>
    <div class="swatch" style="background:#928dab" data-color="#928dab" title="Purple"></div>

    <!-- size -->
    <div class="size-wrap">
      <input type="range" id="sizeSlider" min="2" max="24" value="4"/>
      <div class="size-dot" id="sizeDot" style="width:8px;height:8px;"></div>
    </div>

    <!-- clear -->
    <button class="ctrl-btn" id="clearBtn">Clear</button>

    <!-- save -->
    <button class="ctrl-btn" id="saveBtn">Save Drawing</button>
  </div>

  <!-- home link -->
  <a href="index.html" class="home-btn">← Back to Portfolio</a>

  <!-- easter egg -->
  <div id="egg">
    <h2>You Found It ✦</h2>
    <p>There's nothing here — but there's everything<br/>on the other side of this button.</p>
    <button class="close-egg" id="closeEgg">Close</button>
  </div>

<script>
(function(){
  /* ── PENCIL CURSOR ── */
  const pencil = document.getElementById('pencil');
  document.addEventListener('mousemove', e => {
    pencil.style.left = e.clientX + 'px';
    pencil.style.top  = e.clientY + 'px';
  });

  /* ── BG CANVAS — drifting stars ── */
  const bgC   = document.getElementById('bg-canvas');
  const bgCtx = bgC.getContext('2d');
  let W, H;

  function resize(){
    W = bgC.width  = window.innerWidth;
    H = bgC.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length:80}, () => ({
    x: Math.random() * 1400,
    y: Math.random() * 900,
    r: Math.random() * 1.2 + .2,
    vx: (Math.random() - .5) * .12,
    vy: (Math.random() - .5) * .12,
    a: Math.random() * .35 + .05,
  }));

  (function bgLoop(){
    bgCtx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      if(s.x < 0) s.x = W; if(s.x > W) s.x = 0;
      if(s.y < 0) s.y = H; if(s.y > H) s.y = 0;
      bgCtx.save();
      bgCtx.globalAlpha = s.a;
      bgCtx.fillStyle = '#C8A96E';
      bgCtx.beginPath();
      bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      bgCtx.fill();
      bgCtx.restore();
    });
    requestAnimationFrame(bgLoop);
  })();

  /* ── DRAW CANVAS ── */
  const dc   = document.getElementById('draw-canvas');
  const dCtx = dc.getContext('2d');

  function resizeDraw(){
    // preserve drawing on resize using temp canvas
    const tmp = document.createElement('canvas');
    tmp.width = dc.width; tmp.height = dc.height;
    tmp.getContext('2d').drawImage(dc, 0, 0);
    dc.width = window.innerWidth;
    dc.height = window.innerHeight;
    dCtx.drawImage(tmp, 0, 0);
  }
  dc.width  = window.innerWidth;
  dc.height = window.innerHeight;
  window.addEventListener('resize', resizeDraw);

  let drawing = false;
  let lastX = 0, lastY = 0;
  let color = '#C8A96E';
  let size  = 4;
  let strokes = 0; // count strokes for easter egg

  dCtx.lineCap    = 'round';
  dCtx.lineJoin   = 'round';

  function getPos(e) {
    const r = dc.getBoundingClientRect();
    if(e.touches) return {
      x: e.touches[0].clientX - r.left,
      y: e.touches[0].clientY - r.top
    };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function startDraw(e) {
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    strokes++;
    // easter egg after 7 strokes
    if(strokes === 7) showEgg();
  }

  function draw(e) {
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    dCtx.beginPath();
    dCtx.moveTo(lastX, lastY);
    dCtx.lineTo(p.x, p.y);
    dCtx.strokeStyle = color;
    dCtx.lineWidth   = size;
    dCtx.globalAlpha = .9;
    dCtx.stroke();
    lastX = p.x; lastY = p.y;
  }

  function stopDraw() { drawing = false; }

  dc.addEventListener('mousedown',  startDraw);
  dc.addEventListener('mousemove',  draw);
  dc.addEventListener('mouseup',    stopDraw);
  dc.addEventListener('mouseleave', stopDraw);
  dc.addEventListener('touchstart', startDraw, {passive:false});
  dc.addEventListener('touchmove',  draw,      {passive:false});
  dc.addEventListener('touchend',   stopDraw);

  /* ── COLOR SWATCHES ── */
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      color = sw.dataset.color;
      document.getElementById('sizeDot').style.background = color;
    });
  });

  /* ── SIZE SLIDER ── */
  const slider  = document.getElementById('sizeSlider');
  const sizeDot = document.getElementById('sizeDot');
  slider.addEventListener('input', () => {
    size = parseInt(slider.value);
    const px = size * 2 + 'px';
    sizeDot.style.width  = px;
    sizeDot.style.height = px;
  });

  /* ── CLEAR ── */
  document.getElementById('clearBtn').addEventListener('click', () => {
    dCtx.clearRect(0, 0, dc.width, dc.height);
    strokes = 0;
    // small shake on 404
    const el = document.getElementById('num404');
    el.style.transition = 'transform .05s';
    let s = 0;
    const shake = setInterval(() => {
      el.style.transform = `translateX(${s%2===0?-6:6}px)`;
      if(++s > 8){ el.style.transform=''; clearInterval(shake); }
    }, 50);
  });

  /* ── SAVE DRAWING ── */
  document.getElementById('saveBtn').addEventListener('click', () => {
    // merge bg + draw onto a temp canvas
    const tmp    = document.createElement('canvas');
    tmp.width    = dc.width;
    tmp.height   = dc.height;
    const tCtx   = tmp.getContext('2d');
    tCtx.fillStyle = '#08080a';
    tCtx.fillRect(0, 0, tmp.width, tmp.height);
    tCtx.drawImage(bgC, 0, 0);
    tCtx.drawImage(dc,  0, 0);
    const link   = document.createElement('a');
    link.download = 'ndabistar-404-art.png';
    link.href     = tmp.toDataURL('image/png');
    link.click();
  });

  /* ── EASTER EGG — 7 strokes ── */
  function showEgg(){
    document.getElementById('egg').classList.add('show');
  }
  document.getElementById('closeEgg').addEventListener('click', () => {
    document.getElementById('egg').classList.remove('show');
  });

  /* ── 404 CLICK — glitch burst ── */
  document.getElementById('num404').addEventListener('click', () => {
    const el = document.getElementById('num404');
    el.style.animation = 'none';
    // spray random marks
    for(let i=0; i<12; i++){
      const x = el.offsetLeft + Math.random() * el.offsetWidth;
      const y = el.offsetTop  + Math.random() * el.offsetHeight;
      dCtx.save();
      dCtx.globalAlpha = Math.random() * .5 + .2;
      dCtx.strokeStyle = ['#C8A96E','#E8412A','#2AE8D4'][Math.floor(Math.random()*3)];
      dCtx.lineWidth   = Math.random() * 3 + 1;
      dCtx.beginPath();
      dCtx.moveTo(x, y);
      dCtx.lineTo(x + (Math.random()-0.5)*80, y + (Math.random()-0.5)*80);
      dCtx.stroke();
      dCtx.restore();
    }
    setTimeout(() => { el.style.animation = ''; }, 100);
  });

})();
</script>
</body>
</html>
